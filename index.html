<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Faith Church - Events Calendar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #2a2a2a;
      color: #e8e8e8;
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      line-height: 1.6;
      padding: 40px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 50px;
      border-bottom: 3px solid #66c8ce;
      padding-bottom: 20px;
    }
    
    .header h1 {
      font-size: 48px;
      font-weight: 600;
      color: #66c8ce;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 20px;
      color: #a0a0a0;
    }
    
    .section {
      margin-bottom: 45px;
    }
    
    .section-title {
      font-size: 28px;
      font-weight: 600;
      color: #66c8ce;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .event-item {
      background: #353535;
      border-left: 4px solid #66c8ce;
      padding: 20px 24px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s ease;
      min-height: 70px;
    }
    
    .event-item:hover {
      background: #3f3f3f;
    }
    
    .event-name {
      font-size: 22px;
      font-weight: 500;
      color: #e8e8e8;
      margin-bottom: 6px;
    }
    
    .event-room {
      font-size: 16px;
      color: #a0a0a0;
    }
    
    .event-time {
      font-size: 24px;
      font-weight: 600;
      color: #66c8ce;
      text-align: right;
    }
    
    .no-events {
      text-align: center;
      padding: 40px 20px;
      color: #808080;
      font-size: 18px;
    }
    
    .day-group {
      margin-bottom: 35px;
    }
    
    .day-title {
      font-size: 20px;
      font-weight: 600;
      color: #66c8ce;
      margin-bottom: 15px;
      opacity: 0.9;
    }
    
    .refresh-indicator {
      text-align: center;
      font-size: 12px;
      color: #606060;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #404040;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #66c8ce;
      font-size: 20px;
    }
    
    .error {
      background: #3a2a2a;
      border-left: 4px solid #ff6b6b;
      padding: 20px;
      border-radius: 4px;
      color: #ff8a8a;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>FAITH CHURCH</h1>
      <p>Buildings 4 & 6 Events</p>
    </div>
    
    <div id="content">
      <div class="loading">Loading events...</div>
    </div>
    
    <div class="refresh-indicator" id="refreshInfo">
      Last updated: <span id="lastUpdate">--:--</span>
    </div>
  </div>
  
  <script>
    const ORG_ID = '27556';
    const CLIENT_ID = 'taylor@faithishere.org';
    const SECRET = 'aca7acdf7dad03d9842321e97ed9bf25782399696375444173c5564e8c65fd0a';
    const BUILDINGS = ['Building 4', 'Building 6'];
    
    async function fetchEvents() {
      try {
        const auth = btoa(`${CLIENT_ID}:${SECRET}`);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const saturday = new Date(today);
        saturday.setDate(saturday.getDate() + 6);
        saturday.setHours(23, 59, 59, 999);
        
        const startDate = today.toISOString().split('T')[0];
        const endDate = saturday.toISOString().split('T')[0];
        
        const url = `https://api.planningcenteronline.com/calendar/v2/events?organization_id=${ORG_ID}&filter=after:${startDate},before:${endDate}&per_page=100&include=event_times,locations`;
        
        const response = await fetch(url, {
          headers: {
            'Authorization': `Basic ${auth}`,
            'Accept': 'application/json'
          }
        });
        
        if (!response.ok) {
          throw new Error(`API Error: ${response.status}`);
        }
        
        const data = await response.json();
        return data.data || [];
      } catch (error) {
        console.error('Error fetching events:', error);
        document.getElementById('content').innerHTML = `
          <div class="error">
            Unable to load events. Please check the connection and try again.
          </div>
        `;
        return [];
      }
    }
    
    function filterEventsByBuilding(events) {
      return events.filter(event => {
        const name = event.attributes?.name || '';
        return BUILDINGS.some(building => name.includes(building));
      });
    }
    
    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit',
        meridiem: 'short'
      });
    }
    
    function getDateKey(dateString) {
      return new Date(dateString).toDateString();
    }
    
    function renderEvents(events) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const todayKey = today.toDateString();
      const todayEvents = [];
      const weekEvents = {};
      
      events.forEach(event => {
        const eventTimes = event.relationships?.event_times?.data || [];
        const locations = event.relationships?.locations?.data || [];
        
        eventTimes.forEach((timeRef, idx) => {
          const dateStr = timeRef.attributes?.starts_at || '';
          const dateKey = getDateKey(dateStr);
          const room = locations[idx]?.attributes?.name || 'TBD';
          
          const eventData = {
            name: event.attributes?.name || 'Event',
            time: formatTime(dateStr),
            room: room,
            startsAt: new Date(dateStr)
          };
          
          if (dateKey === todayKey) {
            todayEvents.push(eventData);
          } else {
            if (!weekEvents[dateKey]) {
              weekEvents[dateKey] = [];
            }
            weekEvents[dateKey].push(eventData);
          }
        });
      });
      
      todayEvents.sort((a, b) => a.startsAt - b.startsAt);
      
      let html = '';
      
      // Today's Events
      html += '<div class="section">';
      html += '<div class="section-title">Today\'s Events</div>';
      if (todayEvents.length > 0) {
        html += '<div class="events-list">';
        todayEvents.forEach(event => {
          html += `
            <div class="event-item">
              <div>
                <div class="event-name">${event.name}</div>
                <div class="event-room">${event.room}</div>
              </div>
              <div class="event-time">${event.time}</div>
            </div>
          `;
        });
        html += '</div>';
      } else {
        html += '<div class="no-events">No events today</div>';
      }
      html += '</div>';
      
      // This Week
      if (Object.keys(weekEvents).length > 0) {
        html += '<div class="section">';
        html += '<div class="section-title">This Week</div>';
        
        const sortedDates = Object.keys(weekEvents).sort();
        sortedDates.forEach(dateKey => {
          const date = new Date(dateKey);
          const dayName = date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
          const dayEvents = weekEvents[dateKey];
          dayEvents.sort((a, b) => a.startsAt - b.startsAt);
          
          html += '<div class="day-group">';
          html += `<div class="day-title">${dayName}</div>`;
          html += '<div class="events-list">';
          dayEvents.forEach(event => {
            html += `
              <div class="event-item">
                <div>
                  <div class="event-name">${event.name}</div>
                  <div class="event-room">${event.room}</div>
                </div>
                <div class="event-time">${event.time}</div>
              </div>
            `;
          });
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      
      document.getElementById('content').innerHTML = html;
      updateTimestamp();
    }
    
    function updateTimestamp() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('lastUpdate').textContent = timeStr;
    }
    
    async function loadAndRender() {
      const events = await fetchEvents();
      const filtered = filterEventsByBuilding(events);
      renderEvents(filtered);
    }
    
    loadAndRender();
    setInterval(loadAndRender, 60000);
  </script>
</body>
</html>
