<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Faith Church - Events Calendar</title>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #2a2a2a;
      color: #e8e8e8;
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      line-height: 1.6;
      padding: 40px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 50px;
      border-bottom: 3px solid #66c8ce;
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

      font-size: 48px;
      font-weight: 600;
      color: #66c8ce;
      margin-bottom: 8px;
    }
    
    .header-content p {
      font-size: 20px;
      color: #a0a0a0;
    }
    
    .header-logo {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .section {
      margin-bottom: 45px;
    }

      font-size: 28px;
      font-weight: 600;
      color: #66c8ce;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

      display: flex;
      flex-direction: column;
      gap: 16px;
    }
